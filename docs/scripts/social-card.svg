<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Noto Sans CJK SC','Noto Sans CJK JP',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#131c33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#7af0d0"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- top accent bar -->
  <rect x="80" y="120" width="72" height="6" rx="3" fill="url(#accent)"/>
  <rect x="80" y="136" width="44" height="6" rx="3" fill="#7af0d0" fill-opacity="0.7"/>

  <!-- main title -->
  <text x="80" y="300" font-size="84" font-weight="700" fill="#e8eefc" letter-spacing="2">Python 系统学习指南</text>

  <!-- subtitle -->
  <text x="84" y="360" font-size="30" fill="#9fb0d0" letter-spacing="1">从入门到精通 · 代码示例 + 实战项目 + 学习笔记</text>

  <!-- author block, bottom-left -->
  <circle cx="120" cy="500" r="34" fill="#1c2742"/>
  <text x="120" y="514" font-size="40" font-weight="700" fill="#4f8cff" text-anchor="middle">D</text>
  <text x="172" y="490" font-size="32" font-weight="700" fill="#e8eefc">Destiny</text>
  <text x="172" y="524" font-size="26" fill="#9fb0d0">自动控制 · 强化学习博士</text>

  <!-- footer url, bottom-right -->
  <text x="1120" y="548" font-size="28" fill="#9fb0d0" text-anchor="end" letter-spacing="1">study-python-zj.pages.dev</text>
</svg>
